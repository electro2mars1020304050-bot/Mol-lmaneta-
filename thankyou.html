<style>
*,::after,::before{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0f1a;--surface:#0d1525;--text:#e8edf5;--muted:#7a8ba8;--cyan:#00d4ff;--purple:#a855f7}
body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center}
.card{background:var(--surface);border:1px solid rgba(255,255,255,.06);border-radius:24px;padding:3rem 2rem;max-width:480px;width:100%;box-shadow:0 0 60px rgba(0,212,255,.08)}
.icon{font-size:4rem;margin-bottom:1rem}
h1{font-size:2rem;font-weight:900;margin-bottom:.5rem;background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
p{color:var(--muted);line-height:1.7;margin-bottom:2rem;font-size:1.05rem}
.btn{display:inline-block;padding:.8rem 2rem;border-radius:12px;background:linear-gradient(135deg,#00b4d8,#00e5ff);color:#050810;font-weight:800;text-decoration:none;font-family:'Cairo',sans-serif;transition:transform .2s,box-shadow .2s;margin:.3rem}
.btn:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,229,255,.3)}
</style>
</head>

</div>
</body>
